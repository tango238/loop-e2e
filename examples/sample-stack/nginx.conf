server {
    listen 80;

    # Readiness probe
    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Serve static HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
