<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – Sample App</title>
</head>
<body>
  <h1>Login</h1>
  <form method="post" action="/dashboard">
    <label>
      Email
      <input type="email" name="email" required />
    </label>
    <label>
      Password
      <input type="password" name="password" required />
    </label>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
